<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>G Wedding Planner — Kuwait</title>
  <meta name="description" content="Plan your dream wedding in Kuwait — browse halls, salons, florists, photographers and more." />

  <!-- Fonts (load when online; graceful fallbacks otherwise) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&family=Tajawal:wght@300;400;500;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%90%3C/text%3E%3C/svg%3E" />

  <!-- Firebase readiness handshake (resolved by assets/js/firebase.js) -->
  <script>window.__fbReady = new Promise(function (res) { window.__fbResolve = res; });</script>
</head>
<body>
  <!-- Header -->
  <header class="site-header" id="siteHeader">
    <div class="container header-inner">
      <a href="#/home" class="brand" aria-label="G Wedding Planner home">
        <span class="brand-mark">G</span>
        <span class="brand-text">
          <span class="brand-en">G Wedding Planner</span>
          <span class="brand-ar">جي لتخطيط الأعراس</span>
        </span>
      </a>

      <nav class="main-nav" id="mainNav" aria-label="Main navigation"></nav>

      <div class="header-actions">
        <a href="#/favorites" class="icon-btn" id="favBtn" aria-label="Favorites" data-i18n-title="nav.favorites">
          <svg viewBox="0 0 24 24" class="icon"><path d="M12 21s-7.5-4.9-10-9.3C.4 8.6 1.9 5 5.3 5c2 0 3.3 1.1 4.2 2.3.4.5.9.5 1.3 0C11.7 6.1 13 5 15 5c3.4 0 4.9 3.6 3.3 6.7C19.5 16.1 12 21 12 21z"/></svg>
          <span class="badge" id="favCount" hidden>0</span>
        </a>
        <button class="account-btn" id="accountBtn" aria-label="My account" hidden><span id="accountInitial">G</span></button>
        <button class="lang-toggle" id="langToggle" aria-label="Switch language">
          <span class="lang-opt" data-lang="en">EN</span>
          <span class="lang-sep">/</span>
          <span class="lang-opt" data-lang="ar">ع</span>
        </button>
        <button class="menu-btn" id="menuBtn" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- App content gets rendered here -->
  <main id="app" class="app-root"></main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <span class="brand-mark small">G</span>
        <p data-i18n="footer.tagline">Where every love story begins.</p>
      </div>
      <p class="footer-copy">© <span id="year"></span> G Wedding Planner — <span data-i18n="footer.rights">Made with love in Kuwait.</span></p>
    </div>
  </footer>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Modal root -->
  <div class="modal-root" id="modalRoot" aria-hidden="true"></div>

  <!-- Onboarding (first visit: name + phone) -->
  <div class="onboarding-root" id="onboardingRoot" aria-hidden="true"></div>

  <!-- Firebase (optional real backend; configure in firebase-config.js) -->
  <script src="assets/js/firebase-config.js"></script>
  <script type="module" src="assets/js/firebase.js"></script>

  <!-- Scripts: plain globals, load order matters -->
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
